{% extends "base.html" %}
{% load static %}

{% block title %}Register — SentimentIQ{% endblock %}

{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-base);padding:24px;">
  <div style="width:100%;max-width:440px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:48px;height:48px;margin:0 auto 12px;border-radius:12px;background:linear-gradient(135deg,#14B8A6,#0EA5A4);display:flex;align-items:center;justify-content:center;">
        <span class="material-icons" style="color:#fff;">person_add</span>
      </div>
      <h1 style="font-size:22px;font-weight:700;color:var(--text-primary);margin:0;">Create account</h1>
      <p style="color:var(--text-secondary);font-size:13px;margin-top:6px;">Join SentimentIQ</p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);color:#FCA5A5;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="on">
      {% csrf_token %}
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Username</label>
      <input name="username" required style="width:100%;padding:10px 12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);margin-bottom:14px;font-size:14px;" />
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Email</label>
      <input name="email" type="email" style="width:100%;padding:10px 12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);margin-bottom:14px;font-size:14px;" />
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Password</label>
      <input name="password" type="password" required style="width:100%;padding:10px 12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);margin-bottom:14px;font-size:14px;" />
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Confirm Password</label>
      <input name="confirm" type="password" required style="width:100%;padding:10px 12px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);margin-bottom:20px;font-size:14px;" />
      <button type="submit" style="width:100%;padding:11px;border-radius:8px;background:linear-gradient(135deg,#14B8A6,#0EA5A4);color:#fff;font-weight:600;border:none;cursor:pointer;font-size:14px;">Create account</button>
    </form>

    <p style="text-align:center;margin-top:18px;color:var(--text-secondary);font-size:13px;">
      Already have an account? <a href="{% url 'login' %}" style="color:#14B8A6;text-decoration:none;font-weight:500;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
