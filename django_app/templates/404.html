{% extends "base.html" %}

{% block title %}404 — Not Found{% endblock %}

{% block body %}
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-base);color:var(--text-primary);">
  <h1 style="font-size:96px;font-weight:700;margin:0;background:linear-gradient(135deg,#14B8A6,#0EA5A4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">404</h1>
  <p style="color:var(--text-secondary);margin:8px 0 24px;">Page not found</p>
  <a href="/" style="padding:10px 18px;border-radius:8px;background:linear-gradient(135deg,#14B8A6,#0EA5A4);color:#fff;text-decoration:none;font-weight:600;">Go home</a>
</div>
{% endblock %}
