{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulpe · Sentiment Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    :root {
      --bg-base:       #0F172A;
      --bg-main:       #0B1120;
      --bg-card:       #1E293B;
      --bg-card2:      #0F172A;
      --bg-input:      #1E293B;
      --border:        #334155;
      --border2:       #1E293B;
      --text-primary:  #F1F5F9;
      --text-secondary:#94A3B8;
      --text-muted:    #64748B;
      --text-faint:    #475569;
      --sidebar-bg:    #0F172A;
      --topbar-bg:     #0F172A;
      --scrollbar:     #334155;
      --scrollbar-h:   #475569;
      --log-bg:        #070F1A;
    }

    .theme-light {
      --bg-base:       #FAFAFA;
      --bg-main:       #F1F5F9;
      --bg-card:       #FFFFFF;
      --bg-card2:      #F8FAFC;
      --bg-input:      #F1F5F9;
      --border:        #E2E8F0;
      --border2:       #E2E8F0;
      --text-primary:  #0F172A;
      --text-secondary:#475569;
      --text-muted:    #64748B;
      --text-faint:    #94A3B8;
      --sidebar-bg:    #1E293B;
      --topbar-bg:     #FFFFFF;
      --scrollbar:     #CBD5E1;
      --scrollbar-h:   #94A3B8;
      --log-bg:        #0F172A;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.25s ease, color 0.25s ease;
    }
    h1, h2, h3, h4, .display-font {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    code, pre, .mono, .product-id {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-feature-settings: 'ss02', 'ss19';
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-h); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    input::placeholder { color: #475569; }
    input:focus { border-color: #14B8A6 !important; box-shadow: 0 0 0 3px rgba(20,184,166,0.12); }
    .page-enter { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <div id="root">
    <div id="initial-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-base);z-index:9999;">
      <div style="width:48px;height:48px;border:3px solid #1E293B;border-top-color:#14B8A6;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="color:#94A3B8;margin-top:18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;">Pulpe · loading</div>
    </div>
  </div>

  <!-- Django context injected for API + auth -->
  <script>
    window.DJANGO_CTX = {
      user:        "{{ request.user.username|escapejs }}",
      groups:      {{ user_groups_json|safe }},
      initialPage: "{{ initial_page|escapejs }}",
      csrfToken:   "{{ csrf_token }}",
      logoutUrl:   "/logout/",
    };
  </script>

  <!-- Real API — initializes window.MOCK with real MongoDB data before React renders -->
  <script src="{% static 'js/api.js' %}"></script>

  <!-- React components (same load order as original index.html) -->
  <script type="text/babel" src="{% static 'js/components.jsx' %}"></script>
  <script type="text/babel" src="{% static 'js/pages-auth.jsx' %}"></script>
  <script type="text/babel" src="{% static 'js/page-dashboard.jsx' %}"></script>
  <script type="text/babel" src="{% static 'js/page-live.jsx' %}"></script>
  <script type="text/babel" src="{% static 'js/page-product.jsx' %}"></script>
  <script type="text/babel" src="{% static 'js/pages-other.jsx' %}"></script>

  {% verbatim %}
  <script type="text/babel">
    function App() {
      // Start at 'dashboard' if Django already authenticated, else 'login'
      const initPage = (window.DJANGO_CTX && window.DJANGO_CTX.initialPage) || 'login';
      const [page, setPage] = React.useState(initPage);
      const [collapsed, setCollapsed] = React.useState(false);
      const [darkMode, setDarkMode] = React.useState(true);
      const [toasts, setToasts] = React.useState([]);
      const [selectedProduct, setSelectedProduct] = React.useState('B001E4KFG0');

      const addToast = (type, msg) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, type, msg }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };
      const dismissToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const isAuthPage = page === 'login' || page === 'register';

      if (isAuthPage) {
        return (
          <div className="page-enter">
            {page === 'login'
              ? <LoginPage setPage={setPage} addToast={addToast} />
              : <RegisterPage setPage={setPage} addToast={addToast} />
            }
            <Toast toasts={toasts} dismiss={dismissToast} />
          </div>
        );
      }

      const renderPage = () => {
        switch (page) {
          case 'dashboard': return <DashboardPage setPage={setPage} setSelectedProduct={setSelectedProduct} />;
          case 'live':      return <LiveFeedPage setPage={setPage} setSelectedProduct={setSelectedProduct} />;
          case 'product':   return <ProductDetailPage setPage={setPage} productId={selectedProduct} />;
          case 'pipeline':  return <PipelinePage addToast={addToast} />;
          case 'saved':     return <SavedDashboardsPage setPage={setPage} />;
          case 'admin':     return <AdminPage setPage={setPage} />;
          default:          return <DashboardPage setPage={setPage} setSelectedProduct={setSelectedProduct} />;
        }
      };

      return (
        <div className={darkMode ? '' : 'theme-light'} style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg-base)', transition: 'background 0.25s ease' }}>
          <Sidebar
            currentPage={page}
            setPage={setPage}
            collapsed={collapsed}
            setCollapsed={setCollapsed}
            darkMode={darkMode}
          />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
            <Topbar
              darkMode={darkMode}
              setDarkMode={setDarkMode}
              currentPage={page}
              setPage={setPage}
            />
            <main className="page-enter" style={{
              flex: 1, overflowY: 'auto', overflowX: 'hidden', background: 'var(--bg-main)',
              transition: 'background 0.25s ease',
            }}>
              {renderPage()}
            </main>
          </div>
          <Toast toasts={toasts} dismiss={dismissToast} />
        </div>
      );
    }

    // Render only after api.js bootstrap has populated window.MOCK with real data
    window.renderApp = function() {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    };
    // If bootstrap already finished before this script ran, render immediately
    if (window._apiBootstrapped) {
      window.renderApp();
    }
    // Otherwise api.js will call window.renderApp() when done (see finally block)
  </script>
  {% endverbatim %}
</body>
</html>
